<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>simplees 商品列表</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="page">
    <div class="header">
      <div>
        <h1>商品列表</h1>
        <div class="meta" id="summary">正在加载商品数据</div>
      </div>
      <div class="toolbar">
        <input id="keywordInput" type="search" placeholder="搜索商品、品牌或类目">
        <button id="searchButton">搜索</button>
        <button class="secondary" id="resetButton">全部</button>
      </div>
    </div>

    <section id="notice" class="notice" hidden></section>
    <section id="content"></section>

    <div class="pagination">
      <button class="secondary" id="prevButton">上一页</button>
      <span id="pageInfo">第 1 页</span>
      <button class="secondary" id="nextButton">下一页</button>
    </div>
  </main>

  <dialog id="editDialog" class="dialog">
    <form id="editForm" method="dialog" class="dialog-panel">
      <div class="dialog-header">
        <h2>编辑商品</h2>
        <button class="icon-button" id="closeDialogButton" type="button" aria-label="关闭">x</button>
      </div>

      <input id="editProductId" type="hidden">

      <label>
        商品名称
        <input id="editName" type="text" required>
      </label>

      <label>
        商品描述
        <textarea id="editDescription" rows="3"></textarea>
      </label>

      <div class="form-grid">
        <label>
          价格
          <input id="editPrice" type="number" min="0" step="0.01">
        </label>

        <label>
          状态
          <select id="editStatus">
            <option value="active">active</option>
            <option value="inactive">inactive</option>
          </select>
        </label>
      </div>

      <label>
        品牌 ID
        <input id="editBrandId" type="text" required>
      </label>

      <label>
        类目 ID
        <input id="editCategoryId" type="text" required>
      </label>

      <div class="dialog-actions">
        <button class="secondary" id="cancelEditButton" type="button">取消</button>
        <button id="saveEditButton" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <script src="/static/app.js"></script>
</body>
</html>
